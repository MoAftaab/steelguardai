services:
  api:
    image: moaftaab/steelguard-api:latest
    container_name: steelguard-api
    ports:
      - "8000:8000"
    environment:
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      DATABASE_URL: postgresql://steelguard:steelguard@postgres:5432/steelguard
      QDRANT_URL: http://qdrant:6333
    depends_on:
      - postgres
      - qdrant

  frontend:
    image: moaftaab/steelguard-frontend:latest
    container_name: steelguard-frontend
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
    depends_on:
      - api

  postgres:
    image: postgres:16-alpine
    container_name: steelguard-postgres
    environment:
      POSTGRES_USER: steelguard
      POSTGRES_PASSWORD: steelguard
      POSTGRES_DB: steelguard
    ports:
      - "5432:5432"
    volumes:
      - steelguard-postgres:/var/lib/postgresql/data

  qdrant:
    image: qdrant/qdrant:v1.12.5
    container_name: steelguard-qdrant
    ports:
      - "6333:6333"
    volumes:
      - steelguard-qdrant:/qdrant/storage

volumes:
  steelguard-postgres:
  steelguard-qdrant:
